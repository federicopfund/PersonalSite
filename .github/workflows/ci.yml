name: CI

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]

# Permisos minimos: solo lectura del repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Validacion estructural del paclet ──────────────────────────────────
  structure:
    name: Validacion estructural del paclet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validar estructura del paclet
        run: python3 tools/check_structure.py

  # ── 2. SCSS → CSS coherencia ──────────────────────────────────────────────
  styles:
    name: SCSS compila al CSS commiteado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Sass
        run: npm install -g sass@1.98.0

      - name: Compilar SCSS a un archivo temporal
        run: sass PersonalSite/Resources/Scss/styles.scss /tmp/styles.css --style=compressed --no-source-map

      - name: Verificar que styles.css esta actualizado
        run: |
          if ! diff -q /tmp/styles.css PersonalSite/Resources/Static/styles.css >/dev/null; then
            echo "::error::PersonalSite/Resources/Static/styles.css esta desactualizado. Corre 'make css' y commitea."
            diff /tmp/styles.css PersonalSite/Resources/Static/styles.css || true
            exit 1
          fi
          echo "styles.css coincide con la fuente SCSS."

  # ── 3. Build imagen Docker (local/dev) ────────────────────────────────────
  docker:
    name: Build imagen Docker (dev)
    runs-on: ubuntu-latest
    needs: [structure, styles]
    steps:
      - uses: actions/checkout@v4

      - name: Validar docker-compose
        run: docker compose config -q

      - name: Construir imagen dev
        run: docker build -f PersonalSite/deploy/Dockerfile -t personalsite:ci .

  # ── 4. Build imagen Code Engine (valida Dockerfile.codeengine) ───────────
  docker-ce:
    name: Build imagen Code Engine
    runs-on: ubuntu-latest
    needs: [structure, styles]
    steps:
      - uses: actions/checkout@v4

      - name: Inicializar base de datos seed
        run: |
          sudo apt-get install -y sqlite3 --quiet
          mkdir -p data
          sqlite3 data/site.db < PersonalSite/data/init.sql

      - name: Restaurar mathpass desde secret
        env:
          WOLFRAM_MATHPASS_B64: ${{ secrets.WOLFRAM_MATHPASS_B64 }}
        run: |
          if [ -n "$WOLFRAM_MATHPASS_B64" ]; then
            mkdir -p PersonalSite/deploy
            echo "$WOLFRAM_MATHPASS_B64" | base64 -d > PersonalSite/deploy/mathpass
            echo "Mathpass restaurado."
          else
            echo "::warning::WOLFRAM_MATHPASS_B64 no configurado — build CE sin licencia (solo validacion de estructura)."
            echo "# placeholder — sin licencia" > PersonalSite/deploy/mathpass
          fi

      - name: Construir imagen Code Engine
        run: docker build -f PersonalSite/deploy/Dockerfile.codeengine -t personalsite:ce .
